spring:
    application:
        name: todo-backend

    # ?? Database ??????????????????????????????????????????????????????
    datasource:
        url: jdbc:mysql://localhost:3306/tododb?useSSL=false&allowPublicKeyRetrieval=true
        username: ${DB_USER:root}
        password: ${DB_PASSWORD:root}
        hikari:
            maximum-pool-size: 10
            minimum-idle: 2
            connection-timeout: 30000

    jpa:
        hibernate:
            ddl-auto: validate          # Flyway owns the schema ? never let JPA alter it
        show-sql: false
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQL8Dialect
                format_sql: true

    # ?? Flyway ????????????????????????????????????????????????????????
    flyway:
        enabled: true
        locations: classpath:db/migration
        baseline-on-migrate: true

    # ?? Redis ?????????????????????????????????????????????????????????
    data:
        redis:
            host: ${REDIS_HOST:localhost}
            port: 6379
            timeout: 2000ms

    cache:
        type: redis
        redis:
            time-to-live: 300000        # 5 minutes default TTL

    # ?? Kafka ?????????????????????????????????????????????????????????
    kafka:
        bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
        producer:
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
            acks: all                   # wait for all replicas ? durability over speed
            retries: 3
        consumer:
            group-id: todo-consumer-group
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
            auto-offset-reset: earliest
            properties:
                spring.json.trusted.packages: "com.mangu.todo.kafka"

# ?? Actuator / Observability ???????????????????????????????????????
management:
    endpoints:
        web:
            exposure:
                include: health,info,prometheus,metrics,caches
    endpoint:
        health:
            show-details: always
    metrics:
        tags:
            application: ${spring.application.name}

# ?? App-level config ???????????????????????????????????????????????
app:
    jwt:
        secret: ${JWT_SECRET:mySecretKeyForDevOnlyChangeInProd}
        expiration-ms: 86400000       # 24 hours

    kafka:
        topics:
            todo-events: todo-events

    cache:
        todo-list-key-prefix: "todos:user:"
        todo-item-key-prefix: "todo:item:"

# ?? Logging ???????????????????????????????????????????????????????
logging:
    level:
        com.mangu.todo: DEBUG
        org.springframework.kafka: WARN
        org.hibernate.SQL: WARN