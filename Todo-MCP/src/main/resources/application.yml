spring:
  application:
    name: todo-mcp-server

  ai:
    mcp:
      server:
        name: todo-mcp-server
        version: 1.0.0
        type: SYNC
        streamable-http:
          enabled: true
          mcp-endpoint: /mcp
          sse-endpoint: /sse

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

todo:
  backend:
    base-url: ${TODO_BACKEND_URL:http://localhost:8080}
    jwt-token: ${TODO_BACKEND_JWT:}

logging:
  level:
    org.springframework.ai: DEBUG
    org.learnandforget: DEBUG